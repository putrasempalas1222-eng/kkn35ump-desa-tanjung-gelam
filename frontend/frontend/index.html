<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KKN Kelompok 35 UMP - Desa Tanjung Gelam</title>
    <meta name="description" content="Website resmi Kuliah Kerja Nyata (KKN) Kelompok 35 Universitas Muhammadiyah Palembang di Desa Tanjung Gelam." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'm-blue': '#0071E3',
              'm-blue-dark': '#005BB5',
              'm-green': '#30D158',
              'g-yellow': '#FFD60A',
              'g-red': '#FF453A',
            },
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'SF Pro Text', 'Segoe UI', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --apple-blue: #0071e3;
        --apple-blue-dark: #005bb5;
        --apple-green: #30d158;
        --apple-yellow: #ffd60a;
        --apple-red: #ff453a;
        --apple-ink: #1d1d1f;
        --apple-muted: #6e6e73;
        --surface: #ffffff;
        --surface-soft: #f5f5f7;
        --surface-dark: #000000;
        --outline: rgba(29, 29, 31, 0.14);
        --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.06), 0 6px 18px rgba(0, 0, 0, 0.06);
        --shadow-2: 0 18px 52px rgba(0, 0, 0, 0.13), 0 2px 12px rgba(0, 0, 0, 0.08);
        --shadow-3: 0 28px 90px rgba(0, 0, 0, 0.18), 0 10px 28px rgba(0, 0, 0, 0.12);
      }

      * {
        letter-spacing: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
        background: #f5f5f7;
        color: var(--apple-ink);
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
      }

      .dark body {
        background: #000000;
        color: #f8fafc;
      }

      h1,
      h2,
      h3,
      h4 {
        letter-spacing: 0;
      }

      @keyframes apple-fade-up {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes apple-kenburns {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.045);
        }
      }

      @keyframes apple-sheen {
        0% {
          transform: translateX(-120%) skewX(-12deg);
        }
        100% {
          transform: translateX(220%) skewX(-12deg);
        }
      }

      section {
        animation: apple-fade-up 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      section:nth-of-type(2n) {
        animation-delay: 0.04s;
      }

      img {
        transition: transform 900ms cubic-bezier(0.16, 1, 0.3, 1), filter 500ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      button,
      a[href],
      input,
      textarea,
      select {
        transition:
          background-color 180ms cubic-bezier(0.2, 0, 0, 1),
          border-color 180ms cubic-bezier(0.2, 0, 0, 1),
          color 180ms cubic-bezier(0.2, 0, 0, 1),
          box-shadow 180ms cubic-bezier(0.2, 0, 0, 1),
          transform 240ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      button:hover,
      a[href]:hover {
        transform: translateY(-1px);
      }

      /* Keep nav fixed: prevent transform from breaking position:fixed */
      nav,
      nav *,
      nav:hover,
      nav *:hover {
        transform: none !important;
        animation: none !important;
      }

      button:active,
      a[href]:active {
        transform: translateY(0) scale(0.99);
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--apple-blue) !important;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.16) !important;
      }

      .shadow-sm,
      .shadow-md,
      .shadow-lg,
      .shadow-xl,
      .shadow-2xl {
        box-shadow: var(--shadow-1) !important;
      }

      .shadow-lg,
      .shadow-xl,
      .shadow-2xl {
        box-shadow: var(--shadow-2) !important;
      }

      .rounded-2xl,
      .rounded-\[2rem\],
      .rounded-\[2\.5rem\] {
        border-radius: 28px !important;
      }

      .rounded-full {
        border-radius: 999px !important;
      }


      .bg-m-blue,
      .from-m-blue,
      .to-m-blue-dark {
        position: relative;
        overflow: hidden;
      }

      .bg-m-blue::after,
      .from-m-blue::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 34%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.34), transparent);
        pointer-events: none;
        transform: translateX(-120%) skewX(-12deg);
      }

      .bg-m-blue:hover::after,
      .from-m-blue:hover::after {
        animation: apple-sheen 950ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .container > div,
      main > div,
      aside {
        animation: apple-fade-up 0.72s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      #home img,
      #event img {
        animation: apple-kenburns 18s ease-in-out infinite;
      }

      /* ── Glass Liquid Button System ── */
      .btn-glass {
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(20px) saturate(200%);
        -webkit-backdrop-filter: blur(20px) saturate(200%);
        transition: transform 200ms cubic-bezier(0.16,1,0.3,1), box-shadow 200ms ease, background 200ms ease;
      }

      /* Top shimmer line */
      .btn-glass::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          180deg,
          rgba(255,255,255,0.38) 0%,
          rgba(255,255,255,0.06) 40%,
          transparent 100%
        );
        pointer-events: none;
        z-index: 1;
      }

      /* Sweep shine on hover */
      .btn-glass::after {
        content: '';
        position: absolute;
        top: 0; bottom: 0; left: -80%;
        width: 60%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
        transform: skewX(-12deg);
        pointer-events: none;
        z-index: 2;
        transition: left 0s;
      }

      .btn-glass:hover::after {
        left: 140%;
        transition: left 550ms cubic-bezier(0.16,1,0.3,1);
      }

      .btn-glass:hover {
        transform: translateY(-2px) !important;
      }

      .btn-glass:active {
        transform: translateY(0) scale(0.97) !important;
      }

      /* Blue primary variant */
      .btn-glass-blue {
        background: linear-gradient(
          145deg,
          rgba(96,165,250,0.72) 0%,
          rgba(59,130,246,0.58) 50%,
          rgba(37,99,235,0.65) 100%
        ) !important;
        box-shadow:
          0 6px 28px rgba(59,130,246,0.45),
          0 1px 0 rgba(255,255,255,0.18) inset,
          0 -1px 0 rgba(0,0,0,0.15) inset !important;
        border: 1px solid rgba(147,197,253,0.35) !important;
      }

      .btn-glass-blue:hover {
        background: linear-gradient(
          145deg,
          rgba(96,165,250,0.82) 0%,
          rgba(59,130,246,0.68) 50%,
          rgba(37,99,235,0.75) 100%
        ) !important;
        box-shadow:
          0 10px 36px rgba(59,130,246,0.55),
          0 1px 0 rgba(255,255,255,0.22) inset,
          0 -1px 0 rgba(0,0,0,0.18) inset !important;
      }

      /* Ghost/white variant */
      .btn-glass-white {
        background: linear-gradient(
          145deg,
          rgba(255,255,255,0.22) 0%,
          rgba(255,255,255,0.10) 50%,
          rgba(255,255,255,0.16) 100%
        ) !important;
        box-shadow:
          0 4px 20px rgba(0,0,0,0.20),
          0 1px 0 rgba(255,255,255,0.35) inset,
          0 -1px 0 rgba(0,0,0,0.10) inset !important;
        border: 1px solid rgba(255,255,255,0.24) !important;
      }

      .btn-glass-white:hover {
        background: linear-gradient(
          145deg,
          rgba(255,255,255,0.30) 0%,
          rgba(255,255,255,0.16) 50%,
          rgba(255,255,255,0.22) 100%
        ) !important;
        box-shadow:
          0 6px 28px rgba(0,0,0,0.26),
          0 1px 0 rgba(255,255,255,0.40) inset !important;
      }

      .apple-glass {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: saturate(180%) blur(24px);
        -webkit-backdrop-filter: saturate(180%) blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.44);
        box-shadow: var(--shadow-2);
      }

      .dark .apple-glass {
        background: rgba(22, 22, 23, 0.72);
        border-color: rgba(255, 255, 255, 0.12);
      }

      /* Hide scrollbar for gallery but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .dark input[type="date"]::-webkit-calendar-picker-indicator,
      .dark input[type="time"]::-webkit-calendar-picker-indicator,
      .dark input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.85;
      }

      /* ── Custom Scrollbar — macOS/iOS style ── */

      /* Webkit (Chrome, Safari, Edge) */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.28);
        border-radius: 999px;
        transition: background 200ms ease;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(100, 116, 139, 0.52);
      }

      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.18);
      }

      .dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(148, 163, 184, 0.38);
      }

      /* Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(100, 116, 139, 0.28) transparent;
      }

      .dark * {
        scrollbar-color: rgba(148, 163, 184, 0.18) transparent;
      }

      /* Hide scrollbar for gallery but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
      </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-50 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
